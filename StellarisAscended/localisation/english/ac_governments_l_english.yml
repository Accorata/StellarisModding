# First Event
# Dictatorial
  ascension_governments.1004.name: "$ac_psionic_shock_chain_title$"
  ascension_governments.1004.desc: "...\n\nWe could proclaim our empire chosen by the entities of the Shroud, declaring a mandate of heaven upon our rightfull rule. Alternatively, we could form a conclave of telepaths to merge with the Shroud and weild control over the entire populace."
  ascension_governments.1004.a: "Legitamize our rule."
  ascension_governments.1004.a.tt: "Emphasis on ..."
  ascension_governments.1004.b: "Assemble the conclave."
  ascension_governments.1004.b.tt: "Emphasis on ..."
# Imperial
  ascension_governments.1005.name: "$ac_psionic_shock_chain_title$"
  ascension_governments.1005.desc: "The empire is one with the Shroud. Our telepaths spread the influence of our rule throughout our populace. But now we must decide how §Y[From.GetRulerTitle] [From.GetRulerName]§! wishes to interact with this new realm.\n\nWe could worship our ruler as a diety, ascending their place beyond the mortal realm. Alternatively, we could allow the Shroud's entities to manifest themselves in our ruler, granting supernatural strength."
  ascension_governments.1005.a: "Begin the ascension."
  ascension_governments.1005.a.tt: "Emphasis on the imperial ruler."
  ascension_governments.1005.b: "Call eldritch beings to propose the offer."
  ascension_governments.1005.b.tt: "Emphasis on the Shroud."

# Event Pool 1

