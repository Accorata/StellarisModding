### Genetic ---------------------------------------------------------------------------------------------
  ac_genetic_shock_chain_title: "..."
  ac_genetic_shock_chain_desc: "Through our mastery of genetics, we have gained a much progress in our journey forward. However, this path is far from over. Numerous challenges and opportunities will arise in the days that follow, as our society adapts to our new strengths.\n\nHow we confront these changes will define our society for ages to come."
  ac_genetic_keep_auth_option: "Genetic Ascendency does not change who we are."

## Authorities
# Genetic Imperial Perfect
  auth_ac_genetic_imperial_perfect:0 "Imperial Clones"
  auth_ac_genetic_imperial_perfect_desc:0 "..."
  AUTHORITY_AC_CLONED:1 "$t$ Upon §HRuler Death§! their §HCloned Heir§! becomes the new Ruler."
