## Events
  ac_genetic.social_consequences.tt: "Influences the ongoing §YGenetic Society Shift§!.\n\n" # Standard tooltip to indicate that the Perfected/Chaotic focus variables has changed

# First Event
# Democratic 
  ascension_governments.2.name: "$ac_genetic_shock_chain_title$"
  ascension_governments.2.desc: "Thanks to the efforts of our government, all can now benefit from genetic advancements, curing previously fatal diseases and granting all a better quality of life. Now we have a choice on how to best to express our democratic ideals.\n\nBy limiting genetic diversity to a single phenotype, we could guarantee that all have an equal chance to succeed. Alternatively, we could invest our research into further deviations, granting all the ability to truly express themselves via their body."
  ascension_governments.2.a: "We should focus on guaranteeing true equality."
  ascension_governments.2.a.tt: "Emphasis on ..."
  ascension_governments.2.b: "We must promote freedom of bodily expression."
  ascension_governments.2.b.tt: "Emphasis on ..."

# Oligarchic
  ascension_governments.3.name: "$ac_genetic_shock_chain_title$"
  ascension_governments.3.desc: "...\n\n..."
  ascension_governments.3.a: "Focus ..."
  ascension_governments.3.a.tt: "Emphasis on ...."
  ascension_governments.3.b: "Study ..."
  ascension_governments.3.b.tt: "Emphasis on ..."

# Dictatorial
  ascension_governments.4.name: "$ac_genetic_shock_chain_title$"
  ascension_governments.4.desc: "...\n\nIf we devote our efforts to researching the effects of genetic changes on babies, we could form genetic castes to keep the workers subservient and productive. Alternatively, ..."
  ascension_governments.4.a: "Test reducing intelligence on embryos."
  ascension_governments.4.a.tt: "Emphasis on political power and workers."
  ascension_governments.4.b: "..."
  ascension_governments.4.b.tt: "Emphasis on ..."

# Imperial
  ascension_governments.5.name: "$ac_genetic_shock_chain_title$"
  ascension_governments.5.desc: "Now that the empire has embraced a future of genetics and clones, ...\n\nWe can perfect our cloning technology in order to perfectly recreate our ruler upon passing. Alternatively, we could create genetic diseases and test them on our lower castes to develop better genetic health for the elite."
  ascension_governments.5.a: "Look into cloning consciousness."
  ascension_governments.5.a.tt: "Emphasis on the imperial ruler."
  ascension_governments.5.b: "Develop novel genetic diseases."
  ascension_governments.5.b.tt: "Emphasis on rulers and research."

# Corporate
  ascension_governments.6.name: "$ac_genetic_shock_chain_title$"
  ascension_governments.6.desc: "Our genetic advancements prvoide new markets to explore, but also new risks for competition. We must adapt to these changes in order to embrace this new frontier before any others....\n\n..."
  ascension_governments.6.a: "..."
  ascension_governments.6.a.tt: "Emphasis on ..."
  ascension_governments.6.b: "..."
  ascension_governments.6.b.tt: "Emphasis on ..."

# Event Pool 1
  ascension_governments.7.name: "Preserved Loved Ones"
  ascension_governments.7.desc: "..."
  ascension_governments.7.a: "A wonderful way to remember the deceased." # C
  ascension_governments.7.b: "These are horrid abominations of [root.GetSpeciesName]. Outlaw the process." # P
  ascension_governments.7.c: "Embrace this tradition as a wonderful part of our culture." # Memorialist - C

