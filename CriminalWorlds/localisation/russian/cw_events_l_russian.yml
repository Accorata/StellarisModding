l_russian:
## Planet Events ##
# Corruption 1-3
  criminal_worlds.10.name:0 "Подкупленные силовики на [Root.GetName]"
  criminal_worlds.10.desc:0 "Количество арестов на [Root.GetName] резко сократилось, несмотря на рост преступности. Не будет необоснованным предположить, что некоторые из наших силовиков, которым поручено бороться с этими преступными сетями, попали в зависимость от тех самых организаций, с которыми должны были сражаться.\n\nОчевидно, им необходимо вернуться к своим моральным принципам, и, возможно, потребуется более крупная сила, чтобы искоренить эту проблему."
  criminal_worlds.11.name:0 "Распространённая коррупция на [Root.GetName]"
  criminal_worlds.11.desc:0 "Независимо от того, являются ли эти события новыми или имели место всегда, похоже, что система взяток на [Root.GetName] гораздо масштабнее, чем предполагалось изначально. Мы надеялись, что эти коррумпированные силовики будут привлечены к ответственности после обнаружения, но, тщательно изучив их внутренние документы, выяснилось, что даже их начальство также находится на содержании преступных сетей и готово покрывать коррупцию..\n\nДаже неясно, были ли аресты, которые мы первоначально провели, когда обнаружили эту коррупцию, законными или же это были просто невинные силовики, подставленные высшим руководством."
  criminal_worlds.12.name:0 "Политическая коррупция на [Root.GetName]"
  criminal_worlds.12.desc:0 "Источники наших проблем с преступностью стали ясны.\n\nЭто не просто внутренняя система коррупции среди наших силовиков, коррупция распространяется до самого верха. Политики, которых мы поставили у власти, бросили наше население, преследуя прибыль вместо справедливости. Эта коррупция гораздо масштабнее любых наших оценок, и для её устранения потребуются настоящие усилия."
# Illegal Freeports
  criminal_worlds.20.name:0 "Нелегальные свободные порты появляются на  [Root.GetName]"
  criminal_worlds.20.desc:0 "Наши местные силовики на [Root.GetName] начали раскрывать ряд преступных безопасных убежищ, что объясняет рост местного трафика на [Root.GetName]. Однако оценки количества этих свободных портов ставят число гораздо выше, чем было закрыто."
# Criminal Shipyards - x3 by Crime Lord Deal
  criminal_worlds.21.name:0 "$cw_criminal_shipyards$ на [Root.GetName]"
	criminal_worlds.21.desc:0 "Похоже, что для преступных организаций контроля над [Root.GetName] недостаточно. Силовики обнаружили несколько случаев кражи транспортных средств с сплавами. Подозревают, что оружие производится где-то ещё на [Root.GetName].\n\nНа планете строятся новые флоты на нескольких наземных пиратских верфях. Будем надеяться, что они так же заинтересованы в защите [Root.GetName], как и мы."
  criminal_worlds.22.name:0 "$cw_criminal_shipyards_2$ на [Root.GetName]"
	criminal_worlds.22.desc:0 "Операции расширились. Организации больше не полагаются исключительно на украденные сплавы: теперь целые фабрики находятся под их контролем исключительно для этой цели. Теперь можно найти верфи настоящего размера, и их влияние выходит за рамки контроля местных властей.\n\nДальнейшее усиление, похоже, является единственным способом восстановить наш суверенитет над [Root.GetName] и вернуть контроль над судостроением."
  criminal_worlds.22.a:0 "Арестовать их всех!"
  criminal_worlds.22.b:0 "По крайней мере, они никому не вредят."
# Criminal Fleet Appears
  criminal_worlds.26.name:0 "Флот синдиката построен над [Root.GetName]"
  criminal_worlds.26.desc:0 "Пиратские судостроители на [Root.GetName] построили свою первую партию кораблей, создав флот, который теперь занимает воздушное пространство над планетой. На данный момент они остаются пассивными в своих позициях и действиях, но мы не уверены, что произойдёт дальше.\n\nНа данный момент это лишь небольшие силы, но пока операции на [Root.GetName] продолжаются, кто знает, насколько большими они станут."
  criminal_worlds.26.a:0 "Тревожно."
# Underground Slums
  criminal_worlds.30.name:0 "Подземные трущобы появляются на [Root.GetName]"
	criminal_worlds.30.desc:0 "Жилищный кризис на [Root.GetName] вынудил часть нашего населения спуститься под землю, в канализацию и заброшенные туннели. Это должно уменьшить проблемы с бездомностью, однако эти районы находятся вне досягаемости общества или правоохранительных органов и, скорее всего, останутся зоной беззакония."
  criminal_worlds.31.name:0 "Рост подземных трущоб на [Root.GetName]"
	criminal_worlds.31.desc:0 "Подземные трущобы набирают популярность, поскольку всё больше и больше людей обращаются к глубинам в поисках жилья. Они не должны создавать слишком больших проблем, однако жаль терять всё больше и больше перспективных людей, которые в противном случае могли бы принести большой положительный вклад в общество."
# Mercenary Fighters - Prevented by Crime Lord Deal
  criminal_worlds.32.name:0 "Наёмные бойцы на [Root.GetName]"
	criminal_worlds.32.desc:0 "На [Root.GetName] закрепились группы наёмников, вербующие всех способных к бою под обещанием богатства. Эти воины создают проблемы по всей планете, выполняя заказы за высокую плату и небрежно тренируясь. Проблемы незначительные, но всё же тревожны для местных жителей.\n\nОднако, если нам вдруг понадобится армия, эти наёмники могут стать быстрым и дешёвым решением без слишком больших недостатков по сравнению с призывом ополчения."
  criminal_worlds.32.a:0 "$WORRYING$"
# Infamous Criminal - Prevented by Crime Lord Deal
  criminal_worlds.33.name:0 "Известные преступники на [Root.GetName]"
	criminal_worlds.33.desc:0 "Несколько ужасных личностей с улиц [Root.GetName] стали известны по всей нашей империи. Их наглость по отношению к нашим властям вдохновила других, у которых нет цели, создавать проблемы.\n\nОчевидно, что проблема вышла из-под контроля, если наши силовики не могут поймать даже известных личностей, которые устраивают из этого шоу."
  criminal_worlds.33.a:0 "Это нужно остановить."
# Black Market Relic - x3 by Crime Lord Deal
  criminal_worlds.34.name:0 "Слухи о сделках на [Root.GetName]"
	criminal_worlds.34.desc:0 "В сети чёрных рынков на [Root.GetName] местные власти получили анонимное сообщение от человека, который утверждает, что слышал о продаже могущественного предмета. Детали крайне скудны, и неясно, насколько надёжен этот источник.\n\nНаши силовики уже заняты обычными преступными делами, но передали это выше по цепочке, если мы заинтересованы в том, чтобы направить свои усилия для подтверждения или опровержения этого сообщения."
  criminal_worlds.34.a:0 "Изучить местные слухи на [Root.GetName]."
  criminal_worlds.34.b:0 "Есть вещи поважнее этого."
  criminal_worlds.35.name:0 "Опросы завершены!"
	criminal_worlds.35.desc:0 "Анонимное сообщение оказалось верным. После начала дальнейшего расследования поступили новые отчёты, подтверждающие сообщение и дающие новые сведения о возможных местах. Контрабанда, как полагают, состоит из коллекции небольших древних артефактов, которые каким-то образом попали в руки коллекционера..\n\nТеперь небольшая коллекция переходит из рук в руки на торгах, где различные криминальные авторитеты платят всё более высокие суммы.."
  criminal_worlds.35.a:0 "Изъять эту контрабанду!"
  criminal_worlds.36.name:0 "Артефакты изъяты!"
	criminal_worlds.36.desc:0 "Потребовалось несколько секретных операций в различных преступных группировках на [Root.GetName], но теперь коллекция в нашем распоряжении. Эти небольшие безделушки подтверждены как древние, но первоначальный анализ не обнаружил ничего особенного, что могло бы привести к таким высоким рыночным ценам для криминальных авторитетов."
  criminal_worlds.36.a:0 "Проанализировать изъятое."
  criminal_worlds.37.name:0 "Реликвия найдена!"
	criminal_worlds.37.desc:0 "При дальнейшем исследовании тайника с артефактами один медальон выделялся. Его необычный зелёный металл украшен древними рунами и прикреплён к простой цепочке. Он продолжал привлекать внимание наших учёных, как будто звал их.\n\nДальнейший анализ выявил, что это реликвия великой силы, содержащая мощную псионическую энергию. Её происхождение и назначение неизвестны, но наш ведущий исследователь проекта начал слышать имя во сне: «Этриоки». Наша археологическая группа пришла к выводу, что руны, скорее всего, изображают короля над подданными, а псионическая сила этой реликвии явно имеет большой вес над ослабленным умом. Теперь она наша, и мы можем использовать её по своему усмотрению."
  criminal_worlds.37.a:0 "Замечательно."
  criminal_worlds.38.name:0 "Артефакты проанализированы"
	criminal_worlds.38.desc:0 "Среди этих безделушек есть нечто более ценное: артефакт-предшественник, который помогает объяснить происхождение нашей вселенной. Первоначальный анализ пропустил артефакт, так как он был разбит на четыре части при изъятии у криминальных авторитетов, но теперь, когда он восстановлен, мы знаем ещё больше о тайнах того, что было раньше."
  criminal_worlds.38.a:0 "$criminal_worlds.37.a$"
  criminal_worlds.38.b:0 "К сожалению, избыточно."
# Criminal Worlds
  criminal_worlds.40.name:0 "Преступное влияние на  [Root.GetName]"
	criminal_worlds.40.desc:0 "Преступные организации на [Root.getName] начали консолидировать свои операции, все больше выводя управление планетой из-под нашего контроля. Теперь все больше и больше предприятий на планете находятся в их сфере деятельности, и [Root.getName] начал действовать в некоторой степени независимо."
  criminal_worlds.40.a:0 "$UNFORTUNATE$"
  criminal_worlds.41.name:0 "Число преступников увеличивается на [Root.GetName]"
	criminal_worlds.41.desc:0 "Дальнейшее тихое расширение власти находится в тени [Root.getName]. Низы всегда стремились к большему контролю, и теперь новое криминальное руководство предоставляет им такую возможность.\n\nЕсли мы не примем срочных мер, возможно, эта планета больше никогда не будет нам верна. По крайней мере, эти организации уменьшили нашу потребность в управлении планетой и ее содержанием."
  criminal_worlds.41.a:0 "$UNFORTUNATE$"
  criminal_worlds.42.name:0 "Криминальная консолидация на [Root.GetName]"
	criminal_worlds.42.desc:0 "Преступные организации теперь объединены в единый синдикат, который продолжает отбирать контроль у наших властей. На данный момент преступные сети прочно укоренились в жизни [Root.getName], что их устранение нарушит всю жизнь общества.\n\nМы можем только надеяться, что правоохранительные органы смогут предотвратить дальнейшее ухудшение ситуации. Однако, судя по прошлым действиям, такое будущее кажется маловероятным."
  criminal_worlds.42.a:0 "Ужасно."
  criminal_worlds.43.name:0 "Преступный контроль над  [Root.GetName]"
	criminal_worlds.43.desc:0 "Лояльности больше нет. Назвать планету [Root.getName] нашей, вызвало бы смех у других. Скорее, [Root.getName] - это место деятельности синдиката, где процветает преступность и заключаются сомнительные сделки. Местная индустрия клянется в верности преступникам, утверждая, что теперь они заботятся о [Root.getName] гораздо больше, чем мы когда-либо или будем."
  criminal_worlds.43.a:0 "Ужасно."
  criminal_worlds.44.name:0 "[Root.GetName] это криминальный мир"
	criminal_worlds.44.desc:0 "[Root.getName] попал в руки преступников. О национальном суверенитете практически ничего не известно, и [Root.getName] демонстрирует свою лояльность только на словах.\n\nСлово "преступник" потеряло там всякий смысл. Теперь нет различия между теми, кто надеется на лучшее будущее, и теми, кто надеется на быструю награду: вся жизнь так или иначе связана с великим синдикатом, который держит здесь власть."
  criminal_worlds.44.a:0 "Ужасно."
  criminal_worlds.51.name:0 "[Root.GetName] остается преступным миром"
	criminal_worlds.51.desc:0 "[Root.getName] После многих лет нахождения под контролем преступных группировок, прогресс кажется крайне мрачным. Синдикат, контролирующий эту планету, не проявляет признаков ослабления, и криминальные эксперты говорят, что он будет продолжать терроризировать наш народ еще как минимум десять лет, а, вероятно, и больше, если мы откажемся принимать меры.\n\nНазвать [Root.GetName] планетой [Root.Owner.GetName] было бы преувеличением."
  criminal_worlds.51.a:0 "Ужасно."
# Freedom fighters
  criminal_worlds.45.name:0 "Борцы за свободу на [Root.GetName]"
	criminal_worlds.45.desc:0 "Похоже, что на [Root.GetName] есть противники наших методов борьбы с рабством. Настолько, что возникла подпольная организация, занимающаяся освобождением угнетенных. Если мы не расправимся с этими жалкими мятежниками, они, возможно, добьются некоторого успеха."
  criminal_worlds.45.a:0 "$UNFORTUNATE$"
  criminal_worlds.47.name:0 "Рабы сбегают с [Root.GetName]"
	criminal_worlds.47.desc:0 "Повстанцам-борцам за свободу наконец-то удалось добиться чего-то примечательного: они смогли захватить морское судно и использовать его для оказания помощи рабам в их побеге. Были произведены аресты, но без дальнейших действий эта трагедия может повториться."
  criminal_worlds.47.a:0 "$UNFORTUNATE$"
  criminal_worlds.47.a.tooltip:0 "100 рабов на [Root.GetName] сбежали в другую страну."
# Unlicensed Slave Trade
  criminal_worlds.48.name:0 "Нелицензированная торговля рабами"
	criminal_worlds.48.desc:0 "Местные власти на [Root.GetName] раскрыли крупную торговлю рабами, организованную преступными группировками. Рабы были захвачены на [cw_enslaved_species_owner.GetName] а затем перевезены сюда. То, что начиналось как незначительные расследования необъяснимых появлений инопланетян, быстро выявило зловещие операции. К счастью, рабые были освобождены, и теперь решение о том, что с ними делать, остаётся за нами."
  criminal_worlds.48.a:0 "Вернуть их на [cw_enslaved_species_owner.GetName]."
  criminal_worlds.48.b:0 "Освободить их на [Root.GetName]."
  criminal_worlds.48.c:0 "Нам не помешали бы ещё несколько рабов."
  criminal_worlds.48.d:0 "Убить их всех."
  criminal_worlds.48.e:0 "Вкусно."
  criminal_worlds.48.evopred:0 "Очень вкусно."
# Freed Slaves (Fired from 48 if empire returns them)
  criminal_worlds.49.name:0 "Рабы возвращены"
	criminal_worlds.49.desc:0 "Мы получили сообщения от [From.Owner.GetName] о том, что они встретили несколько представителей нашего населения, которые были порабощены и переправлены на одну из их планет. Корабли с нашими освобождёнными гражданами только сейчас достигают нашей границы, и мы приветствуем их обратно с большой радостью. Многие из них считались мёртвыми или пропавшими без вести настолько долго, что казалось, будто они никогда не вернутся. На наших планетах царит большая благодарность к [From.Owner.GetName]."
  criminal_worlds.49.a:0 "Замечательно."
  opinion_cw_freed_slaves:0 "Освобождённые рабы"
# Radical Media
  criminal_worlds.50.name:0 "Демагогия на [Root.GetName]"
	criminal_worlds.50.desc:0 "Подозрительные личности начали распространять необоснованные теории заговора через наши СМИ. Эти демагоги опираются на растущее недовольство на [Root.GetName], а также на отсутствие текущих регулирующих органов. Для предотвращения этой клеветы и её ужасного влияния потребуется некая форма перевоспитания или реабилитации."
  criminal_worlds.50.a:0 "Прискорбно."
  criminal_worlds.50.b:0 "Подавить их выступления."

## Anomalies ##
# Criminal Stockpile Anomaly
  cw_criminal_stockpile_cat:0 "Радиопереговоры"
  cw_criminal_stockpile_cat_desc:0 "Наши датчики зафиксировали радиопереговоры на [Root.GetName]. Похоже, они ведутся на нашем языке."
  cw_anomaly.1.name:0 "Криминальное убежище"
  cw_anomaly.1.desc:0 "Похоже, небольшая группа пиратов скрывалась здесь, используя этот астероид как склад для своих трофеев. Они оказали небольшое сопротивление, когда их обнаружили, явно не ожидая, что кто-то их найдёт.\n\nМы арестовали их и конфисковали ресурсы."
  cw_anomaly.1.a:0 "$EXCELLENT$"
  cw_anomaly.1.b:0 "Провести трансляцию их казни."
  cw_anomaly.2.name:0 "Ничего необычного"
  cw_anomaly.2.desc:0 "После дальнейшего изучения сигнала §Y[Root.GetLeaderName]§! сообщил, что на астероиде ничего необычного не обнаружено. Скорее всего, произошла какая-то неисправность, из-за которой наши радиосигналы перехватывали внутренние сообщения наших кораблей.\n\nОднако другой член экипажа утверждает, что наши датчики работали без ошибок, и уверен, что §Y[Root.GetLeaderName]§! скрывает то, что они там нашли."
  cw_anomaly.2.a:0 "Они бы никогда!"
  cw_anomaly.2.b:0 "Конфисковать всё!"
# Ruined Undercity Anomaly
  cw_ruined_undercity_cat:0 "Подземные показания"
  cw_ruined_undercity_cat_desc:0 "Наши датчики обнаружили подземные области под корой [Root.GetName]. Необходимы дальнейшие исследования."
  cw_anomaly.3.name:0 "Разрушенный подземный город"
  cw_anomaly.3.desc:0 "Ниже уровня поверхности §Y[Root.GetName]§! наши исследователи обнаружили древний город, затопленный отложениями за многие годы. Город, похоже, является остатками цивилизации, не освоившей космос, которая вымерла по неизвестным причинам. Однако эти останки не примитивные и всё ещё находятся в приличном состоянии, образуя сеть туннелей под поверхностью §Y[Root.GetName]§!."
  cw_anomaly.3.a:0 "$INTERESTING$"
# Sinister Dreams Anomaly
  cw_sinister_dreams_cat:0 "Зловещие сны"
  cw_sinister_dreams_cat_desc:0 "Экипаж нашего научного корабля сообщил о зловещих снах, которые не исчезают. Постоянные видения показывали им их прошлое и, что более интересно, возможно, их будущее.\n\nОни клянутся, что [Root.GetName] преследуют духи какой-то злой природы или что там скрывается какое-то великое зло. Дальнейший анализ может пролить свет на их переживания."
  cw_anomaly.4.name:0 "Тёмные шёпоты"
  cw_anomaly.4.desc:0 "Экипаж не ошибался. Хотя §Y[Root.GetLeaderName]§! не уверен, что это, он также чувствует то же зло, и оно не показывает никаких признаков остановки.\n\nКогда эта новость достигла научного сообщества страны, некоторые призывают к дальнейшим исследованиям и созданию исследовательской базы на §Y[Root.GetName]§!. Другие говорят, что никогда не подойдут близко."
  cw_anomaly.4.a:0 "$DISTURBING$"
  cw_anomaly.4.b:0 "Дальнейшие знания о псионике."
  cw_anomaly.5.name:0 "Ментальные иллюзии"
  cw_anomaly.5.desc:0 "Похоже, §Y[Root.GetLeaderName]§! переживал волну сильных псионических снов. Нет никакой корреляции с [Root.GetName]. Однако этот псионический опыт помог нашим учёным углубиться в эту интересную область исследований. Надеемся, дальнейшие достижения объяснят видения экипажа."
  cw_anomaly.5.a:0 "$FASCINATING$"

## Espionage Events ##
# Fleet Gains Confusion
  criminal_worlds.102.name:0 "[fromfrom.GetName] взломан!"
  criminal_worlds.102.desc:0 "При столкновении с вражеским флотом все корабли в §Y[fromfrom.GetName]§! начали стрелять друг по другу. Наши адмиралы описывают ужасающую картину: все системы вооружения заблокированы для стрельбы, а данные сенсоров искажены, чтобы предотвратить различение друга и врага. Все корабельные системы находятся на автопилоте и полностью блокируют любые новые входные данные.\n\nТакая атака, вероятно, является результатом кибератаки со стороны другой страны, хотя навыки, необходимые для создания и доставки такого вируса, экстраординарны. Наши эксперты по кибербезопасности считают, что может потребоваться §Y50§! дней, прежде чем наше программное обеспечение сможет полностью восстановить контроль над флотом."
# Hack Fleet - Step 1
  criminal_worlds.103.name:0 "Определение цели"
  criminal_worlds.103.desc:0 "Чтобы взломать вражеский флот, мы должны найти корабль, в который сможем внедрить вредоносное ПО. После прикрепления к кораблю оно распространится на остальной флот, но мы должны быть осторожны при выборе первоначальной цели. Среди прочего, цель должна быть достаточно уязвима для вирусов и получать многочисленные сообщения, чтобы наше сообщение могло просочиться. Наши оперативники перебирали нашу разведку, чтобы сделать этот решающий выбор, и наконец представилась возможность."
# Hack Fleet - Step 2
  criminal_worlds.104.name:0 "Обход файрвола"
  criminal_worlds.104.desc:0 "Хотя мы определили перспективную слабую точку во флоте, корабль, который должен быть уязвим для нашего вируса, каждый современный военный корабль оснащён тяжёлыми мерами безопасности. Вместо того чтобы взламывать цель методом перебора и рисковать раскрыть наши намерения, оперативники получат актуальные коды с военных баз."
# Hack Fleet - Step 3
  criminal_worlds.105.name:0 "Передача файла"
  criminal_worlds.105.desc:0 "Когда защита целевого корабля наконец отключена, мы теперь можем нанести удар. Наши оперативники расположились на разумном расстоянии от флота, чтобы предотвратить немедленную пометку передачи. Небольшой гражданский корабль теперь достаточно близок, чтобы любые отправленные сообщения выглядели как обычные навигационные данные. Мы готовы к передаче."
# Hack Fleet - Success
  criminal_worlds.106.name:0 "Вражеский флот взломан"
  criminal_worlds.106.desc:0 "Наш специальный пакет вредоносного ПО был развёрнут в системе вражеского корабля в §Y[cw_hacked_fleet.GetName]§!. Каждый раз, когда компьютерные системы кораблей общаются друг с другом для получения навигационных данных, есть небольшая вероятность, что вирус будет приложен к передаче. Учитывая быструю связь между современными военными кораблями, в считанные мгновения вирус проникнет в компьютер каждого корабля во флоте. При следующем военно-морском столкновении флота вирус активируется, переписывая данные сенсоров, чтобы убрать различия между врагом и союзником, и вызовет хаос, пока не будет полностью удалён антивирусными программами."

## Criminal Enclaves ##
  CW_NEVERMIND:0 "Не важно."
  cw_opinion30:0 "Мнение: £opinion£ §G+30§!"
# Construction Ship  - x3 by Crime Lord Deal
  cw_enclave.1.name:0 "Криминальные постройки"
  cw_enclave.1.desc:0 "Над §Y[Root.GetName]§! теперь находится новый строительный корабль — продукт преступных предприятий, расположенных ниже. Его намерения неизвестны, и мы можем только раздумывать относительно его цели.\n\nХотя он представляет собой очередное расширение преступного влияния, любое подобное вторжение в наш звёздный доминион должно быть ограничено, иначе он будет быстро уничтожен. Преступные лорды прекрасно осведомлены об этом и не станут рисковать, провоцируя открытый конфликт."
  cw_enclave.1.a:0 "Наблюдать за ситуацией."
# Outpost Built
  cw_enclave.2.name:0 "Преступный аванпост"
  cw_enclave.2.desc:0 "Строительство преступного предприятия завершено. В системе теперь находится большая станция, на орбите [Root.GetName]. В этой станции расположен новый анклав, сформированный из преступников галактики. Они заявляют, что эта станция существует только для новых операций и не претендует на систему. Кроме того, анклав предлагает свои услуги любой нации, за плату."
  cw_enclave.2.a:0 "Открыть канал связи."

# Criminal Enclave has New Offers
  cw_enclave.301.name:0 "Доступны новые предложения"
  cw_enclave.301.desc:0 "Частично благодаря вашему покровительству мы смогли расширить наши операции здесь, в [cw_criminal_enclave_country.GetName]. У нас есть новые предложения, которые вам, возможно, захочется изучить, и мы надеемся, что наши отношения останутся очень прибыльными."
  cw_enclave.301.a:0 "Давайте посмотрим, что здесь может быть интересно."
  cw_enclave.301.b:0 "$GOODBYE$" # Exit

# Criminal Enclave Destroyed
  # Normal
  cw_enclave.211.name:0 "Преступный анклав уничтожен"
  cw_enclave.211.desc:0 "Флот [fromfrom.GetName] успешно атаковал и разгромил крепость [from.GetName], что привело к коллапсу анклава. Все торговые операции с [from.GetName] прекращены, и они больше не будут создавать проблемы для нашей нации. Преступники продолжают существовать по всей галактике, но сегодня они потеряли одно из своих основных владений."
  cw_enclave.211.a:0 "Такова природа галактики."
  # Killer
  cw_enclave.214.name:0 "Преступный анклав побеждён"
  cw_enclave.214.desc:0 "Наши флоты уничтожили главный операционный центр [from.GetName], рассредоточив членов анклава по галактике. Они больше не будут терроризировать галактику под этим именем. Сегодня великий день для всех законопослушных наций."
  cw_enclave.214.a:0 "Миссия выполнена!"
  # Host
  cw_enclave.213.name:0 "$cw_enclave.211.name$"
  cw_enclave.213.desc:0 "$cw_enclave.211.desc$"
  cw_enclave.213.a:0 "Избавились."
  cw_enclave.213.b:0 "Поощрить развитие другого анклава."

# Hacker Aura Announcement
  cw_enclave.201.name:0 "Не отвечающее оружие!"
  cw_enclave.201.desc:0 "При атаке на хакерский анклав наш флот сразу же стал объектом многочисленных кибератак. Мы получаем сообщения о колебаниях щитов и заклинивших оружиях. Однако в целом последствия не слишком серьёзны. Наш флот по-прежнему будет эффективен, хотя и в меньшей степени, чем мы изначально предполагали."
  cw_enclave.201.a:0 "Уничтожьте их и покончите с этим."

## Racketeers
# Main Menu
  cw_enclave.302.name:0 "Приветствия"
  cw_enclave.302.desc:0 "Ваша репутация идёт впереди вас, [Root.GetSpeciesNamePlural].\n\nМы рады приветствовать вас в нашей штаб-квартире и надеемся построить прибыльные отношения. У нас есть контакты по всей галактике, преступные организации, которые понимают, что такое хороший бизнес. Мы уверены, что вы тоже это понимаете. В обмен на ваши кредиты мы и наши партнёры можем предложить многочисленные преимущества. Чем мы можем быть вам полезны?"
  cw_enclave.302.a:0 "Нас интересуют §YКонтрабандное оружие§!."
  cw_enclave.302.a.tooltip:0 "Ежемесячные поставки §Y$alloys_with_icon$§!."
  cw_enclave.302.a.has_deal:0 "Преступные рэкетиры уже продают нам §Y$alloys_with_icon$§!."
  cw_enclave.302.b:0 "Нас интересуют §YНезаконные наркотики§!."
  cw_enclave.302.b.tooltip:0 "Ежемесячные поставки §Y$consumer_goods_with_icon$§!."
  cw_enclave.302.b.has_deal:0 "Преступные рэкетиры уже продают нам §Y$consumer_goods_with_icon$§!."
  cw_enclave.302.c:0 "Мы хотели бы нанять одного из ваших лучших §YRэкетиров§!."
  cw_enclave.302.c.leader_opinion_req:0 "Требуется, чтобы эти §YRэкетиры§! имели:\n£opinion£ Мнение +30"
  cw_enclave.302.c.has_leader:0 "Мы можем нанять только §Yодного§! §HРэкетира из анклава§! за раз."
  cw_enclave.302.d:0 "Нас интересует покупка §YРабов§!."
  cw_enclave.302.d.unique_opinion_req:0 "Требуется, чтобы эти §YRэкетиры§! имели:\n£opinion£ Мнение +50"
  cw_enclave.302.d.slave_planet:0 "У этого анклава нет пригодной планеты для порабощения людей."
  cw_enclave.302.d.cooldown:0 "Этот анклав слишком недавно порабощал людей."
  cw_enclave.302.e:0 "Мы ищем §YЗащиту§! от ваших работорговцев."
  cw_enclave.302.e.bribery_opinion_req:0 "Требуется, чтобы эти §YRэкетиры§! имели:\n£opinion£ Мнение +80"

# Trade Deals (Alloys & Consumer Goods)
  cw_enclave.400.name:0 "Покупка контрабандных орудий"
  cw_enclave.400.desc:0 "Ну что ж, мы не удивлены. Торговля оружием всегда привлекает новых клиентов в этой воюющей галактике. Пожалуйста, не пугайтесь, если вы узнаете какое-либо из своего оружия на продажу; мы не можем позволить себе иметь любимчиков. Мы заверяем, что все активы находятся в отличном состоянии, не уступая качеству только что изготовленных.\n\nКонечно, все они будут продаваться на условии, что они не будут использоваться против нашей операции здесь. Любые и все покупки будут немедленно аннулированы, если один из ваших адмиралов решит затеять драку."
  cw_enclave.400.a:0 "Мы возьмём одну поставку." # 1
  cw_enclave.400.b:0 "Мы возьмём пару поставок." # 2
  cw_enclave.400.c:0 "Мы возьмём умеренное количество." # 5
  cw_enclave.400.d:0 "Мы возьмём большое количество." # 10
  cw_enclave.400.e:0 "Мы возьмём всё." # 15
  cw_enclave.400.response:0 "Приятно было вести дела. Мы уверены, что вы придёте снова."
  cw_enclave.400.f:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.400.g:0 "$GOODBYE$" # Exit
  cw_enclave.401.name:0 "Покупка нелегальных наркотиков"
  cw_enclave.401.desc:0 "Вам может быть интересно, чем может помочь большое количество запрещённых веществ. Ну, за правильную цену мы снабдим различных подчинённых в вашей империи и поможем удовлетворить потребности вашего народа. Вы удивитесь, что можно сделать с несколькими экзотическими газами, смешанными с экскрементами тийянки. Или, может быть, вы предпочитаете зро, кристаллизованный из солнечной вспышки? В любом случае, мы готовы предоставить всё, что вам нужно."
  cw_enclave.401.a:0 "$cw_enclave.400.a$" # 2
  cw_enclave.401.b:0 "$cw_enclave.400.b$" # 5
  cw_enclave.401.c:0 "$cw_enclave.400.c$" # 10
  cw_enclave.401.d:0 "$cw_enclave.400.d$" # 20
  cw_enclave.401.e:0 "$cw_enclave.400.e$" # 30
  cw_enclave.401.response:0 "$cw_enclave.400.response$"
  cw_enclave.401.f:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.401.g:0 "$GOODBYE$" # Exit
# Renew Trade Deals
  cw_enclave.403.name:0 "Возобновить покупку оружия"
  cw_enclave.403.desc:0 "По нашим данным, срок действия нашей предыдущей сделки с оружием истек. Тем не менее, наша незаконная торговля оружием остается довольно прибыльной, и мы по-прежнему можем предложить гораздо больше. Предполагая, что это соглашение вам понравилось, мы надеемся продолжить сотрудничество и продлить эту сделку еще на 10 лет.Конечно, дайте нам знать, если мы сможем предоставить вам что-нибудь еще."
  cw_enclave.403.a:0 "$cw_enclave.400.a$" # 1
  cw_enclave.403.b:0 "$cw_enclave.400.b$" # 2
  cw_enclave.403.c:0 "$cw_enclave.400.c$" # 5
  cw_enclave.403.d:0 "$cw_enclave.400.d$" # 10
  cw_enclave.403.e:0 "$cw_enclave.400.e$" # 15
  cw_enclave.403.response:0 "$cw_enclave.400.response$"
  cw_enclave.403.f:0 "Что еще вы можете предложить?" # Main Menu
  cw_enclave.403.g:0 "Нет, спасибо." # Exit
  cw_enclave.404.name:0 "Возобновить закупку наркотиков"
  cw_enclave.404.desc:0 "В наших отчетах указано, что срок действия нашей предыдущей сделки с наркотиками истек. И это очень печально, потому что наш новый штамм уже зарекомендовал себя и он намного лучше, чем любой из продуктов, которые вы получали ранее. Однако, если эта сделка продолжится, вы сможете получить доступ ко всему нашему каталогу. Мы бы предпочли продолжать вести бизнес, и мы уверены, что вы бы тоже этого хотели. Поэтому давайте продлим наше соглашение еще на 10 лет.Конечно, дайте нам знать, если мы сможем предложить вам что-то еще."
  cw_enclave.404.a:0 "$cw_enclave.401.a$" # 2
  cw_enclave.404.b:0 "$cw_enclave.401.b$" # 5
  cw_enclave.404.c:0 "$cw_enclave.401.c$" # 10
  cw_enclave.404.d:0 "$cw_enclave.401.d$" # 20
  cw_enclave.404.e:0 "$cw_enclave.401.e$" # 30
  cw_enclave.404.response:0 "$cw_enclave.401.response$"
  cw_enclave.404.f:0 "Что еще вы можете предложить?" # Main Menu
  cw_enclave.404.g:0 "Нет, спасибо." # Exit

# Leader Purchase 
  cw_enclave.402.name:0 "Нанять рэкетира" 
  cw_enclave.402.desc:0 "Вам повезло. Один из наших опытных чиновников, специализирующийся на управлении преступными организациями, готов работать на вас. Его навыки могут отличаться от привычных вам, но он гарантирует результаты. Вы должны обеспечить, чтобы у него был контроль над своей работой и чтобы ваши [root.CW_GetEnforcerName_Plural_Lowercase] не вмешивались. Конечно, мы отпустим его только за плату."
  cw_enclave.402.a:0 "Ваш рэкетир получит всё необходимое." 
  cw_racketeer_leader_explanation:0 "Мы наймём чиновника уровня §Y4§! с подклассом §Y$subclass_cw_official_racketeer$§!.\n$opinion20$"
  cw_enclave.402.b:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.402.c:0 "$GOODBYE$" # Exit

# Purchase Slaves
  cw_enclave.407.name:0 "Купить рабов" 
  cw_enclave.407.desc:0 "Наше новое предприятие — торговля рабами. Очень сложно провозить такие большие скопления инопланетян по галактике. Это нужно делать небольшими партиями, чтобы слиться с местным трафиком. Но, как вы, наверное, уже догадались, оплата хорошая.\n\nУ нас есть только одно требование: мы получаем наши кредиты. После этого рабы ваши, и вы вольны делать с ними всё, что захотите. Отправить их в свои шахты, освободить как граждан или убить ради развлечения — выбор за вами. Если в этой галактике должен быть порядок, законы собственности должны соблюдаться. 
  cw_enclave.407.a:0 "Возьмём по минимуму." # 100
  cw_enclave.407.a.tooltip:0 "§Y100§! жителей с [cw_enslaved_planet.GetName] будут переселены в нашу столицу.\n$opinion10$"
  cw_enclave.407.b:0 "Возьмём хорошую партийку." # 200
  cw_enclave.407.b.tooltip:0 "§Y200§! жителей с [cw_enslaved_planet.GetName] будут переселены в нашу столицу.\n$opinion15$"
  cw_enclave.407.c:0 "Возьмём столько, сколько сможете достать." # 300
  cw_enclave.407.c.tooltip:0 "§Y300§! жителей с [cw_enslaved_planet.GetName] будут переселены в нашу столицу.\n$opinion20$"
  cw_enclave.407.d:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.407.e:0 "$GOODBYE$" # Exit
# Enslaved Pops Event
  cw_enclave.408.name:0 "Жители порабощены на [cw_enslaved_planet.GetName]" 
  cw_enclave.408.desc:0 "На §Y[cw_enslaved_planet.GetName]§! скоординированная преступная операция привела к захвату и порабощению многочисленных жителей. К тому времени, когда местные власти осознали масштаб операции, жертвы уже были вывезены с планеты, вероятно, проданы иностранной империи. В результате этой преступной деятельности §Y[CW_GetNumSlaves] жителей§! исчезли.\n\nНа данный момент мы можем только предпринять шаги, чтобы это не повторилось. Такая крупная операция маловероятна для этих преступных организаций, работающих в одиночку. Скорее всего, рабы были куплены другой империей через сделку с §YRacketeer Enclave§!. Мы должны либо снизить уровень преступности на наших планетах, ликвидировать анклав, вызвавший это, либо подкупить такой анклав, чтобы гарантировать, что мы не станем мишенями."
  cw_enclave.408.a:0 "Возмутительно!"

# Bribery
  cw_enclave.409.name:0 "Подкупить рэкетиров" 
  cw_enclave.409.desc:0 "Ну вот вы и здесь. Защита от нашей работы очень востребована. Мы можем только оградить вас от нашей торговли рабами и других рэкетирских анклавов. Дальше вы будете сами по себе, так что не приходите к нам, если ваши собственные люди сформируют свои преступные организации.\n\nВы должны понимать, что торговля рабами весьма прибыльна, и мы не отдаём свои места для сбора просто так. Это будет стоить вам."
  cw_enclave.bribery_reduced:0 "Тем не менее, ваш флот впечатляет. Мы предпочли бы сгладить ситуацию взаимовыгодной сделкой, поэтому попросим только 75% от того, что обычно запрашивали бы."
  cw_enclave.409.desc.medium:0 "$cw_enclave.409.desc$ $cw_enclave.bribery_reduced$"
  cw_enclave.409.desc.strong:0 "$cw_enclave.409.desc$ Тем не менее, наши операции в основном планетарного характера. Когда дело доходит до флотов, наши не так многочисленны, как ваши. Союзник с вашей морской мощью был бы полезным активом. Чтобы поощрить заключение этой сделки, мы предложим нашу защиту за полцены."
  cw_enclave.racketeer_bribery:0 "Только потому, что мы защищаем наших людей."
  cw_enclave.409.a:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.409.b:0 "Мы не ведём переговоров с преступниками." # Exit

## Privateers
# Main Menu
  cw_enclave.303.name:0 "$cw_enclave.302.name$"
  cw_enclave.303.desc:0 "Добро пожаловать, добро пожаловать. Мы — [cw_criminal_enclave_country.GetName], моряки пустоты и воины смелых звёзд.\n\nСвободолюбивые и пираты, наши пилоты были хорошо подготовлены опасностями этой галактики и своей целью разбогатеть. Однако мы не просто пиратские фанатики, которых вы встречаете в этой галактике, а коллектив, связанный честью, восстанавливающий достоинство каперского образа жизни. Наши цели остаются прежними, но мы понимаем необходимость порядка. Наши услуги многочисленны, так что, пожалуйста, найдите работу, которую мы можем выполнить."
  cw_enclave.303.a:0 "Мы хотели бы, чтобы вы §Yпритесняли наших соперников§!."
  cw_enclave.303.a.cooldown:0 "Этот анклав слишком недавно участвовал в рейде."
  cw_enclave.303.a.need_rivals:0 "$marauder.20.need_rivals$"
  cw_enclave.303.b:0 "Мы хотели бы оказать вам §поддержку§! в вашей операции."
  cw_enclave.303.b.cooldown:0 "Мы слишком недавно снабжали этот анклав оружием."
  cw_enclave.303.c:0 "Мы хотели бы нанять одного из ваших лучших §Yкаперов§!."
  cw_enclave.303.c.leader_opinion_req:0 "Требуется, чтобы эти §Yкаперы§! имели:\n£opinion£ Мнение +30"
  cw_enclave.303.c.has_leader:0 "Мы можем нанять только §Yодного§! §Hкапера анклава§! за раз."
  # cw_enclave.303.d:0 "Нас интересуют §Yукраденные образцы§!."
  # cw_enclave.303.d.no_stealing_system:0 "У этого анклава нет жизнеспособной системы, из которой можно было бы украсть образцы."
  # cw_enclave.303.d.cooldown:0 "Этот анклав слишком недавно совершал рейды за образцами."
  cw_enclave.303.d.no_archive:0 "Нас интересуют §Yукраденные ресурсы§!."
  cw_enclave.303.d.unique_opinion_req:0 "Требуется, чтобы эти §Yкаперы§! имели:\n£opinion£ Мнение +50"
  cw_enclave.303.d.no_raidable_system:0 "У этого анклава нет жизнеспособной системы для рейдов за ресурсами."
  cw_enclave.303.d.no_archive_cooldown:0 "Этот анклав слишком недавно совершал рейды за ресурсами."
  cw_enclave.303.e:0 "Мы ищем §Yзащиты§! от ваших рейдеров."
  cw_enclave.303.e.bribery_opinion_req:0 "Требуется, чтобы эти §Yкаперы§! имели:\n£opinion£ Мнение +80"

# Harass Rivals Menu
  cw_enclave.503.name:0 "Притеснять соперников"
  cw_enclave.503.desc:0 "Какими бы мы были пиратами, если бы не могли совершать набеги на врагов? Мы рождены свободными, рождены для острых ощущений в бою. Наши флоты, возможно, не так могущественны, как империи этой галактики, но мы компенсируем это хитростью и бравадой! Направьте нас на ваших врагов, и позвольте нам показать, на что мы способны. На кого вы хотите, чтобы мы напали?"
  cw_enclave.503.a:0 "§YThe [cw_pirate_target_1.GetName].§!"
  cw_enclave.503.b:0 "§YThe [cw_pirate_target_2.GetName].§!"
  cw_enclave.503.c:0 "§YThe [cw_pirate_target_3.GetName].§!"
  cw_enclave.503.d:0 "§YThe [cw_pirate_target_4.GetName].§!"
  cw_enclave.503.e:0 "В самом деле, $CW_NEVERMIND$" # Main Menu
  cw_enclave.503.f:0 "$GOODBYE$" # Exit
# Harass Confirmation
  cw_enclave.504.name:0 "$cw_enclave.503.name$"
  cw_enclave.504.desc:0 "Вы хотите, чтобы мы притесняли [cw_pirate_confirmed_target.GetName]? Очень хорошо. Наши флоты мобилизуются в данный момент. Мы встретимся с ними на их так называемой территории и покажем, на что способна наша сталь. Космос принадлежит всем нам."
  cw_enclave.504.a:0 "Дайте им хороший бой!."
  cw_enclave.pirate_harass:0 "[cw_criminal_enclave_country.GetName] Флоты атакуют пограничные системы [cw_pirate_confirmed_target.GetName].\n$opinion20$"
  cw_enclave.504.b:0 "У нас есть другая цель."
  cw_enclave.504.c:0 "Давайте пересмотрим наши планы... ." # Main Menu
  cw_enclave.504.d:0 "$GOODBYE$" # Exit
  cw_enclave.504.response:0 "Слава никого не ждёт!"
# Harass Denied
  cw_enclave.505.name:0 "$cw_enclave.503.name$"
  cw_enclave.505.desc:0 "Нам неприятно отклонять цель, но §Y[cw_pirate_confirmed_target.GetName]§! находится под запретом. Честь не позволяет нам вступать в бой с таким противником. Надеемся, у вас есть кто-то ещё, на кого можно напасть."
  cw_enclave.505.a:0 "Бесполезно." # Exit
  cw_enclave.505.b:0 "У нас есть другая цель."
  cw_enclave.505.c:0 "Что еще вы можете предложить?" # Main Menu
# Empire Harassed
  cw_enclave.507.name:0 "Рейды каперов"
  cw_enclave.507.desc:0 "Один из ваших соперников ясно дал понять, что вы станете достойной целью. Любая возможность продемонстрировать наше мастерство в бою приветствуется, особенно когда за это платят. Кроме того, ваша империя обладает некоторыми прекрасными сокровищами.\n\nКак [cw_criminal_enclave_country.GetName], мы обязаны заранее сообщить вам о нашем рейде, чтобы наш бой мог быть честным представлением каждой стороны. Наши флоты отправляются на рассвете. За славу!"
  cw_enclave.507.a:0 "Наши флоты легко отразит вашу атаку." # Exit
  cw_enclave.507.b:0 "Кто вас нанял?"
  cw_enclave.507.b.response:0 "Честь не позволяет нам делиться этой информацией."

# Supply Weaponry
  cw_enclave.513.name:0 "Поставка вооружения"
  cw_enclave.513.desc:0 "Рейды поддерживают большую часть нашего содержания, но без сборных военных компонентов можно зайти не так далеко. Ваша империя производит их в изобилии, и мы хорошо компенсируем то, что нам нужно.\n\nТакие поставки также помогут в развитии нашего флота, к которому вы сможете обратиться, чтобы совершать набеги на своих врагов в этой враждебной галактике. Наши отважные адмиралы живут ради острых ощущений в бою и будут гордиться возможностью доказать свои навыки."
  cw_enclave.513.a:0 "Мы можем выделить немного." 
  cw_enclave.513.b:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.513.c:0 "$GOODBYE$" # Exit

# Leader Purchase 
  cw_enclave.509.name:0 "Нанять капера"
  cw_enclave.509.desc:0 "Наши каперы — лучшие, которых вы найдёте в этой галактике, но не без причины. Они отважны, готовы показать своим врагам, на что способны. Мы отпустим их только в том случае, если они смогут доказать свои заслуги [Root.GetSpeciesAdj]-роду. Только тогда они смогут добиться своей чести и соответствовать нашему кодексу каперов."
  cw_enclave.509.a:0 "Добро пожаловать на борт." 
  cw_privateer_leader_explanation:0 "Мы наймём командира уровня §Y4§! с подклассом §Y$subclass_cw_commander_privateer$§!.\n$opinion20$"
  cw_enclave.509.b:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.509.c:0 "$GOODBYE$" # Exit

