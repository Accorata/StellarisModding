# Purchase Stolen Resources
  cw_enclave.511.name:0 "Покупка украденных ресурсов"
  cw_enclave.511.desc:0 "У вас возникли проблемы с ресурсами? Если да, то вам повезло. Ваши соседние империи не справились с очисткой своих территорий от пиратских повстанцев, а пираты готовы совершить набег. С нашей помощью и руководством они могут предоставить всё, что вам может понадобиться."
  cw_enclave.511.a:0 "§YНапасть на конвой с энергией§!." # Energy
  cw_enclave.511.b:0 "§RНапасть на минеральный конвой§." # Minerals
  cw_enclave.511.c:0 "§GНапасть на продовольственный конвой§!." # Food
  cw_enclave.511.d:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.511.e:0 "$GOODBYE$" # Exit
# Resources Stolen
  cw_plunder_enclave_culprit:0 "Хотя нападение было совершено местными пиратами, такая скоординированная атака нехарактерна для них. Наши эксперты по военной обороне связывают налёт с §YPrivateer Enclave§!, крадущим ресурсы для другой империи. Мы должны либо уничтожить пиратов вблизи нашей территории, либо ликвидировать анклав, вызвавший это, либо подкупить такой анклав для защиты."
  # Energy
  cw_enclave.514.name:0 "§YКонвой с энергией разграблен§!!"
  cw_enclave.514.desc:0 "При транспортировке энергетических запасов между планетами большой конвой был атакован маленькой, но эффективной группой пиратских кораблей. Хотя некоторым из меньших кораблей удалось избежать атаки, рейдеры завладели большим запасом критически важных ресурсов.\n\n$cw_plunder_enclave_culprit$"
  cw_enclave.514.a:0 "Возмутительно!"
  # Minerals
  cw_enclave.515.name:0 "§RМинеральный конвой разграблен§!!"
  cw_enclave.515.desc:0 "При транспортировке строительных материалов между планетами большой конвой был атакован маленькой, но эффективной группой пиратских кораблей. Хотя некоторым из меньших кораблей удалось избежать атаки, рейдеры завладели большим запасом критически важных ресурсов.\n\n$cw_plunder_enclave_culprit$"
  cw_enclave.515.a:0 "Возмутительно!"
  # Food
  cw_enclave.516.name:0 "§GПродовольственный конвой разграблен§!!"
  cw_enclave.516.desc:0 "При транспортировке критически важных продовольственных запасов между планетами большой конвой был атакован небольшой, но эффективной группой пиратских кораблей. Хотя некоторым из меньших кораблей удалось избежать атаки, рейдеры завладели большим запасом критически важных ресурсов.\n\n$cw_plunder_enclave_culprit$"
  cw_enclave.516.a:0 "Возмутительно!"

# Bribery
  cw_enclave.517.name:0 "Подкупить каперов" 
  cw_enclave.517.desc:0 "Это были беспокоящие флоты или налёты на ваши конвои, которые привели вас к такой трусости? Или, может быть, вы просто боитесь того, что мы можем с вами сделать?\n\nМы бы унизили вас ещё больше, если бы сами не были слугами монеты. Гарантии вашей безопасности будут стоить дорого."
  cw_enclave.517.desc.medium:0 "$cw_enclave.517.desc$ $cw_enclave.bribery_reduced$"
  cw_enclave.517.desc.strong:0 "$cw_enclave.517.desc$ Тем не менее, мы должны спросить, почему вы бросаетесь к нашим ногам. Ваши флоты могущественны, ваши адмиралы храбры, а ваше оружие смертоносно. Мы с большим восхищением относимся к вашему флоту. Поэтому мы просим гораздо меньше обычного в обмен на нашу защиту."
  cw_enclave.517.desc.warlord:0 "Наш собрат-пират, тебе не место стоять на коленях у наших ног. У вас нет причин бояться нас. Несмотря на то, что вы можете считать нас беззаконниками, мы хотели бы верить, что уважаем универсальные законы чести. Кодекс разбойников объединяет всех, кто обращается к его пути, и великие военачальники галактики не являются исключением."
  cw_enclave.privateer_bribery:0 "Вы лучше сдержите это обещание."
  cw_enclave.517.warlord:0 "За свободных моряков космоса!"
  cw_enclave.517.a:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.517.b:0 "Мы не ведём переговоров с преступниками." # Exit

## Hackers
# Main Menu
  cw_enclave.304.name:0 "$cw_enclave.302.name$"
  cw_enclave.304.desc:0 "§VПодключение§!...\n§EПроверка§!...\n§cСОЕДИНЕНИЕ УСТАНОВЛЕНО§!\n\n§GДобро пожаловать в [cw_criminal_enclave_country.GetName]§!. Здесь несколько хакерских гильдий объединились, чтобы предложить свои услуги тем, кто §lможет заплатить цену§!. Хотя наша физическая территория довольно ограничена, наши члены имеют влияние во всём галактическом киберпространстве. Мы уверены, что у нас есть предложения, которые вы хотели бы принять."
  cw_enclave.304.a:0 "Как вы можете помочь нашим усилиям по §Yшпионажу§!?"
  cw_enclave.304.a.has_key:0 "Преступные хакеры уже оказывают помощь в шпионаже."
  cw_enclave.304.b:0 "Мы хотели бы, чтобы вы §Yвзломали наших соперников§!."
  cw_enclave.304.b.cooldown:0 "Этот анклав слишком недавно участвовал во взломе."
  cw_enclave.304.b.need_rivals:0 "$marauder.20.need_rivals$"
  cw_enclave.304.c:0 "Мы хотели бы нанять одного из ваших лучших §Yхакеров§!."
  cw_enclave.304.c.leader_opinion_req:0 "Требуется, чтобы эти §Yхакеры§! имели:\n£opinion£ Мнение +30"
  cw_enclave.304.c.has_leader:0 "Мы можем нанять только §Yодного§! §Hхакера из анклава§! одновременно."
  cw_enclave.304.c.gestalt:0 "Мы хотели бы §Yинтегрировать§! ваши методы."
  cw_enclave.304.c.has_assimilated:0 "Мы уже ассимилировали §Y$leader_trait_cw_hacker_node$§!."
  cw_enclave.304.d:0 "Мы хотели бы купить §Yспециальный вирус§!."
  cw_enclave.304.d.unique_opinion_req:0 "Требуется, чтобы эти §Yхакеры§! имели:\n£opinion£ Мнение +50"
  cw_enclave.304.d.has_hack:0 "У нас уже есть хакерский вирус для развёртывания."
  cw_enclave.304.e:0 "Мы ищем §Yзащиту§! от ваших хакеров."
  cw_enclave.304.e.bribery_opinion_req:0 "Требуется, чтобы эти §YHackers§! имели:\n£opinion£ Мнение +80"

# Skeleton Key
  cw_enclave.600.name:0 "Скелетный ключ"
  cw_enclave.600.desc:0 "Здесь мы предлагаем лучшие эксплойты и бэкдоры, разработанные нашими хакерами. За разумную плату эта информация может стать вашей, и вы сможете распоряжаться ею по своему усмотрению. Кроме того, в течение следующих §Y10 лет§! мы будем обновлять эти файлы, включая самые последние коды, эксплойты и бэкдоры, чтобы ваши разведчики всегда работали с актуальной информацией."
  cw_enclave.600.a:0 "Замечательно."
  cw_enclave.600.b:0 "Что еще вы можете предложить?" # Main Menu
  cw_enclave.600.c:0 "$GOODBYE$" # Exit
# Skeleton Key Renewal
  cw_enclave.601.name:0 "Обновить скелетный ключ"
  cw_enclave.601.desc:0 "§H<Автоматизированный голос>§!\nУважаемые [Root.GetSpeciesNamePlural], как §dискусственный ассистент§! [cw_criminal_enclave_country.GetName], я здесь, чтобы уведомить вас, что ваша подписка на услугу скелетного ключа истекла. Если её не продлить, мы прекратим предоставление наших эксплойтов, и ваши текущие инструменты быстро устареют. Рекомендую как можно скорее продлить подписку, и я соединю вас с соответствующим контактом.\n§H</Автоматизированный голос>§!\n\nСнова добро пожаловать [Root.GetSpeciesNamePlural]! Как мы уверены, вы только что были проинформированы, что 10 лет по нашему предыдущему контракту истекли. Мы рады продлить его ещё на 10 лет при условии кредитной транзакции."
  cw_enclave.601.a:0 "Мы переведём оплату сейчас."
  cw_enclave.601.b:0 "Что ещё вы можете предложить?" # Main Menu
  cw_enclave.601.c:0 "Нет, спасибо." # Exit

# Hacking Rivals Menu
  cw_enclave.602.name:0 "Взломать конкурентов"
  cw_enclave.602.desc:0 "Вы попали по адресу. Наши хакеры §Eисключительны§!, им нет равных. Мы можем нацелиться на любых ваших конкурентов в различных местах, будь то военные, экономические или политические. Всё, что вам нужно сделать, — это сказать слово и, конечно, заплатить нам соответственно.\n\nКого бы вы хотели, чтобы мы взломали?"
  cw_enclave.602.a:0 "§YThe [cw_hack_target_1.GetName].§!"
  cw_enclave.602.b:0 "§YThe [cw_hack_target_2.GetName].§!"
  cw_enclave.602.c:0 "§YThe [cw_hack_target_3.GetName].§!"
  cw_enclave.602.d:0 "§YThe [cw_hack_target_4.GetName].§!"
  cw_enclave.602.e:0 "Вообщем, $CW_NEVERMIND$" # Main Menu
  cw_enclave.602.f:0 "$GOODBYE$" # Exit
# Hack Selection
  cw_enclave.603.name:0 "$cw_enclave.602.name$"
  cw_enclave.603.desc:0 "Наши хакеры обнаружили §Pуязвимости§! в кибербезопасности [cw_hack_confirmed_target.GetName], позволяющие атаковать любые из их §Yвоенных§!, §Yэкономических§! или §Yполитических§! активы.\n\nМы могли бы запустить скоординированную атаку на их военные ремонтные дроны, заставив их использовать дополнительные ресурсы для поддержания боеготовности своих флотов. Мы могли бы разрушить их базы данных цепочек поставок и оставить их грузовые корабли в глубоком космосе, далеко от желаемых пунктов назначения. Мы могли бы раскрыть конфиденциальные файлы их общественности и отобразить их в столице, посеяв недоверие к их правительству.\n\nКонечно, выполнение любого из этих действий будет стоить денег."
  cw_enclave.603.a:0 "Подорвать их военные ремонтные дроны." # Military
  cw_enclave.military_hack:0 "Незначительно увеличивает §Y[cw_hack_confirmed_target.GetName]'s§! расходы на логистику кораблей.\n$opinion10$"
  cw_enclave.603.b:0 "Отключить их инфраструктуру и цепочки поставок." # Economic
  cw_enclave.economic_hack:0 "Незначительно увеличивает §Y[cw_hack_confirmed_target.GetName]'s§! расходы на поддержание рабочих мест.\n$opinion10$"
  cw_enclave.603.c:0 "Раскрыть их конфиденциальные файлы общественности." # Political
  cw_enclave.political_hack:0 "Незначительно снижает §Y[cw_hack_confirmed_target.GetName]'s§! единство и привлекательность правительственной этики.\n$opinion10$"
  cw_enclave.603.d:0 "У нас есть другая цель в виду."
  cw_enclave.603.e:0 "Давайте кое-что пересмотрим." # Main Menu
  cw_enclave.603.f:0 "$GOODBYE$" # Exit
  cw_enclave.603.response:0 "Считайте, что дело сделано."
# Hack Denied
  cw_enclave.604.name:0 "$cw_enclave.602.name$"
  cw_enclave.604.desc:0 "К сожалению, из-за военной и политической силы §Y[cw_hack_confirmed_target.GetName]§!, наша организация считает, что любая кибервойна против них, скорее всего, приведёт к невыгодным результатам.\nПриносим извинения и надеемся, что сможем найти другой способ ведения бизнеса."
  cw_enclave.604.a:0 "Бесполезно." # Exit
  cw_enclave.604.b:0 "У нас есть другая цель в виду."
  cw_enclave.604.c:0 "Что еще вы можете предложить?" # Main Menu
# Hack Received
  cw_hack_enclave_culprit:0 "Наш глава кибербезопасности проследил взлом настолько далеко, насколько это возможно, но любая убедительная улика ускользнула от нас. Контрразведка считает, что для такой операции потребовались связи с тёмной сетью, выходящие за пределы возможностей любой крупной державы. Скорее всего, это работа независимых хакеров, нанятых одним из наших соперников для совершения этой атаки."
  # Military
  cw_enclave.605.name:0 "Военный логистический взлом" 
  cw_enclave.605.desc:0 "Ещё один из наших военно-ремонтных дронов взорвался без объяснения причин, что стало четвёртым случаем на этой неделе. Этот последний инцидент подтверждает наши уже имеющиеся опасения, что эти взрывы не являются простой случайностью или следствием неисправной техники, а являются результатом скоординированной атаки иностранных хакеров. Существенного ущерба нашим военным кораблям нанесено не было, но эти атаки усложнили проведение критически важного технического обслуживания. Пока не будут установлены эффективные брандмауэры, потребуются дополнительные ресурсы, чтобы поддерживать наши флоты в боевой готовности.\n\n$cw_hack_enclave_culprit$""
  cw_enclave.605.a:0 "$UNFORTUNATE$"
  # Economic
  cw_enclave.606.name:0 "Экономические базы данных взломаны" 
  cw_enclave.606.desc:0 "Логистические базы данных на [capital_scope.GetName] внезапно рухнули, создав дефицит по всей стране. Грузовые корабли оказываются в случайных координатах, только чтобы оказаться далеко от намеченного пункта назначения. Наши администраторы перегружены ручной работой, необходимой для перенаправления нашей коллективной логистики без помощи скомпрометированных искусственных систем. Пройдёт некоторое время, прежде чем последствия этого взлома пройдут.\n\n$cw_hack_enclave_culprit$"
  cw_enclave.606.a:0 "$UNFORTUNATE$"
  # Political
  cw_enclave.607.name:0 "Политические секреты взломаны"
  cw_enclave.607.desc:0 "Конфиденциальные секреты в настоящее время отображаются на [capital_scope.GetName] на наших официальных экранах. Администраторы спешат деактивировать экраны и предотвратить дальнейшее распространение информации среди общественности, но ущерб уже нанесён. Если они ещё не сделали этого, эти секреты скоро распространятся до самых отдалённых колоний. Недоверие к правительству неизбежно возрастёт среди нашего населения, и мы должны быть осторожны в предстоящие месяцы.\n\n$cw_hack_enclave_culprit$"
  cw_enclave.607.a:0 "$UNFORTUNATE$"

# Leader Purchase 
  cw_enclave.608.name:0 "Нанять хакера" 
  cw_enclave.608.desc:0 "Наши хакеры чрезвычайно талантливы, но за такой талант приходится платить высокую цену. При условии, что им будут хорошо платить и о них будут должным образом заботиться, среди нас есть немало тех, кто готов служить вашей империи. Кроме того, известно, что наши хакеры не очень-то благосклонны к властям, и наши методы отличаются от методов тех, кто прошел "надлежащую" подготовку. Однако, если вы готовы принять эти условия, они окажут вам неоценимую помощь."
  cw_enclave.608.a:0 "Мы рады приветствовать вашего хакера в нашей команде." 
  cw_hacker_leader_explanation:0 "Мы наймем специалиста §Y4§! уровня Ученый с §Y$subclass_cw_scientist_hacker$§! Подкласс.\n$opinion20$"
  cw_enclave.608.b:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.608.c:0 "$GOODBYE$" # Exit
# Integrate Methods
  cw_enclave.616.name:0 "Интегрировать методы" 
  cw_enclave.616.desc:0 "Необычная просьба. Но, опять же, мы не привыкли иметь дело с вашим типом людей. По натуре мы одиночки и предпочитаем встречаться только анонимно в киберпространстве. Однако, за соответствующую плату, мы готовы предоставить информацию о наших различных методах. Они обязательно будут ограничены, так как мы не можем выдавать наши самые ценные секреты, но предоставим вам расширенные возможности в области шпионажа."
  cw_enclave.616.a:0 "Мы возьмем эти данные."
  cw_enclave.616.b:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.616.c:0 "$GOODBYE$" # Exit

# Tech Virus
  cw_enclave.611.name:0 "Купить вирус" 
  cw_enclave.611.desc:0 "Наши хакеры здесь, в [cw_criminal_enclave_country.GetName] очень ценят ваше покровительство, и без него мы никогда бы не смогли развить нашу деятельность до нынешнего уровня.\n\nВ связи с этим мы с гордостью представляем вам наше новейшее творение: вирус, который будет красть технологические секреты ваших конкурентов по мере их получения. Благодаря этому активу в другой империи каждый раз, когда они исследуют новую технологию, вы получаете §Y10%§! прогресса в известной им случайной технологии.\n\nОднако установить вирус не так-то просто. Предварительное программное обеспечение, которое в качестве дополнительного подарка будет прилагаться к вашей покупке, также необходимо будет установить заранее при выполнении любых шпионских действий. Это отключит антивирусную защиту от антагонистов и позволит нашему программному обеспечению выполнять свою работу в течение пяти лет, прежде чем его обновят."
  cw_enclave.611.a:0 "Мы возьмом вирус." 
  cw_enclave.611.response:0 "Замечательный. Мы должны добавить, что вирус можно использовать только один раз, но мы с радостью предоставим вам дополнительные кредиты."
  cw_enclave.611.b:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.611.c:0 "$GOODBYE$" # Exit
# Activate Virus
  cw_enclave.613.name:0 "Запущен хакерский вирус" 
  cw_enclave.613.desc:0 "По завершении наших шпионских действий против §Y[FromFrom.getName]§! наш специалист по шпионажу сообщает, что вирус, который мы приобрели у хакерского анклава, готов к активации. Наши сотрудники смогли установить предварительное программное обеспечение в соответствии с инструкциями, которое должно было снять любую антивирусную защиту от вирусного пакета.\n\nНаконец, все, что нам остается сделать, - это передать вирус или сохранить его для другой цели, так как, только мы его используем, нам нужно будет приобрести еще одну копию у хакеров. Антивирусное программное обеспечение отключится всего на мгновение, поэтому мы должны действовать немедленно, если вообще хотим что-то предпринять."
  cw_enclave.613.a:0 "Передайте посылку." 
  cw_enclave.613.b:0 "Сохраните ее для другого адресата."
  cw_hacker_virus_effects:0 "В течение §Y5§! Лет всякий раз, когда §Y[FromFrom.getName]§! Исследует новую технологию, мы будем получать §Y10%§! Прогресс в случайной технологии."

# Bribery 
  cw_enclave.615.name:0 "Подкуп Хакеров" 
  cw_enclave.615.desc:0 "Мы не удивлены. Наши хакеры обладают высокой квалификацией и нашли множество уязвимостей в вашей кибербезопасности. Мы бы предложили исправить их, но это лишило бы нас возможности работать, поэтому мы оставим это на усмотрение ваших "экспертов".Тем не менее, мы можем пообещать, что больше не будем заключать сделки против вас, хотя нам потребуется изрядная сумма кредитов, чтобы сделать такую сделку стоящей."
  cw_enclave.615.desc.medium:0 "$cw_enclave.615.desc$ $cw_enclave.bribery_reduced$"
  cw_enclave.615.desc.strong:0 "$cw_enclave.615.desc$ Тем не менее, мы также хорошо осведомлены о силе ваших флотов. Хотя мы можем управлять киберпространством, наша физическая крепость уязвима. Мы бы предпочли избежать подобной конфронтации и соответствующим образом снизим стоимость этой сделки."
  cw_enclave.hacker_bribery:0 "Как вы хотите."
  cw_enclave.615.a:0 "$CW_NEVERMIND$" # Main Menu
  cw_enclave.615.b:0 "Мы не ведём переговоров с преступниками." # Exit
