  tr_cw_criminality_war_crimes_delayed:0 "Мы наслаждаемся тем фактом, что наши подчиненные делают вид, что придерживаются каких-то высших моральных принципов. Это делает их крики еще более приятными."
  tr_cw_criminality_plundered_assets:0 "Похищенные активы"
