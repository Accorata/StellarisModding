  tr_cw_criminality_finish_tooltip:0 "Разблокирует £official£ §Y$CW_RACKETEER$§!, £commander£ §Y$CW_PRIVATEER$§!, и £scientist£ §Y$CW_HACKER$§! Классы ветеранов" # Should make game concepts for these classes
