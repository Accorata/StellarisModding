  tr_cw_criminality_pirate_warlord:0 "Главарь пиратов"
  tr_cw_criminality_pirate_warlord_delayed:0 "Некоторые называют это терроризмом, спонсируемым государством. Мы называем это поиском союзников везде, где только можем их найти."
