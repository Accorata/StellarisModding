  cw_military_hacked_desc:0 "За плату от наших соперников гильдии хакеров-изгоев использовали уязвимости в военных системах защиты, открывая воздушные шлюзы и взрывая небольшие заряды на наших дронах технического обслуживания. Для поддержания боеготовности наших кораблей потребуются дополнительные запасы."
  cw_economy_hacked:0 "Экономические базы данных взломаны"
  cw_economy_hacked_desc:0 "За плату от наших соперников гильдии хакеров-изгоев нарушили наши цепочки поставок, отключив логистические базы данных и инфраструктуру. Потребуется время, прежде чем операции снова смогут идти гладко."
  cw_politics_hacked:0 "Политические секреты взломаны"
  cw_politics_hacked_desc:0 "За плату от наших соперников гильдии хакеров-изгоев раскрыли конфиденциальные секреты общественности, посеяв недоверие среди нашего народа. Наши команды по связям с общественностью работают в полную силу, но только время покажет, можно ли будет исправить нанесённый ущерб."
  cw_purchased_hacker_virus:0 "Пакет вируса $CW_HACKER$"
  cw_purchased_hacker_virus_tt:0 "§G+1§! Вирус хакера"
  cw_purchased_hacker_virus_desc:0 "Мы приобрели технологический вирус у анклава $CW_HACKER$, который будет красть технологии у другой империи, как только мы завершим шпионскую операцию против них."
  cw_bribed_hackers:0 "Подкупленные $CW_HACKER_PLURAL$"
